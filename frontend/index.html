<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBB Flow Controller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-primary: #1e1e1e; --bg-card: #2a2a2a; --border-card: #3a3a3a; --accent-green: #177e89; --accent-red: #db3a34; --accent-teal: #084c61; --accent-gold: #ffc857; --text-primary: #f5f5f5; --text-secondary: #a0a0a0; --btn-primary: #ffc857; --btn-hover: #e6b84d; --btn-text: #1e1e1e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        h1 { font-size: 24px; font-weight: 600; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .account-select { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-card); padding: 10px 12px; border-radius: 6px; font-family: inherit; font-size: 14px; min-width: 150px; }
        button { font-family: inherit; padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background-color 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-primary { background-color: var(--btn-primary); color: white; }
        .btn-primary:hover { background-color: var(--btn-hover); }
        .btn-secondary { background-color: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-card); }
        .btn-secondary:hover { background-color: var(--border-card); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .devices-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .device-card { background-color: var(--bg-card); border: 1px solid var(--border-card); border-radius: 8px; padding: 20px; transition: transform 0.2s; }
        .device-card:hover { transform: scale(1.02); }
        .device-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .device-icon { font-size: 32px; }
        .device-status { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .device-status.on { background-color: rgba(23, 126, 137, 0.2); color: var(--accent-teal); }
        .device-status.off { background-color: rgba(219, 58, 52, 0.2); color: var(--accent-red); }
        .device-status.loading { background-color: rgba(255, 200, 87, 0.2); color: var(--btn-primary); }
        .device-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .device-info { color: var(--text-secondary); font-size: 14px; margin-bottom: 12px; }
        .device-actions { display: flex; gap: 10px; }
        .device-actions button { flex: 1; }
        .btn-toggle { background-color: var(--accent-teal); color: white; }
        .btn-toggle:hover { background-color: var(--accent-green); }
        .btn-toggle.on { background-color: var(--accent-red); }
        .btn-toggle.on:hover { background-color: #c02e2a; }
        .btn-delete { background: transparent; color: var(--accent-red); padding: 10px; font-size: 18px; }
        .btn-delete:hover { background: rgba(219,58,52,0.1); }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state h2 { margin-bottom: 8px; color: var(--text-primary); }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.7); display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 0; visibility: hidden; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal { background-color: var(--bg-card); border: 1px solid var(--border-card); border-radius: 8px; padding: 24px; width: 90%; max-width: 400px; }
        .app-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--accent-red); color: white; padding: 12px 24px; border-radius: 6px; z-index: 10000; opacity: 0; transition: opacity 0.3s; }
        .app-alert.show { opacity: 1; }
        .modal h2 { font-size: 18px; margin-bottom: 16px; }
        .modal-input { width: 100%; padding: 12px; border: 1px solid var(--border-card); border-radius: 6px; background-color: var(--bg-primary); color: var(--text-primary); font-family: inherit; font-size: 14px; margin-bottom: 12px; }
        .modal-input:focus { outline: none; border-color: var(--btn-primary); }
        .modal-select { width: 100%; padding: 12px; border: 1px solid var(--border-card); border-radius: 6px; background-color: var(--bg-primary); color: var(--text-primary); font-family: inherit; font-size: 14px; margin-bottom: 12px; }
        .modal-row { margin-bottom: 12px; }
        .modal-row label { display: block; margin-bottom: 6px; color: var(--text-secondary); font-size: 14px; }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
        
        /* Tabs */
        .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border-card); margin-bottom: 24px; }
        .tab { padding: 12px 24px; cursor: pointer; border: none; background: none; color: var(--text-secondary); font-size: 15px; font-weight: 500; position: relative; }
        .tab:hover { color: var(--text-primary); }
        .tab.active { color: var(--btn-primary); }
        .tab.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: var(--btn-primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Rack Builder */
        .rack-builder { display: grid; grid-template-columns: 280px 1fr; gap: 24px; }
        .rack-list { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 8px; padding: 16px; height: fit-content; }
        .rack-list-item { padding: 12px; border-radius: 6px; cursor: pointer; margin-bottom: 8px; background: var(--border-card); }
        .rack-list-item:hover { background: var(--accent-teal); }
        .rack-list-item.active { background: var(--accent-teal); }
        .rack-canvas { background: var(--bg-card); border: 2px dashed var(--border-card); border-radius: 8px; min-height: 500px; padding: 20px; position: relative; }
        .rack-canvas.drag-over { border-color: var(--btn-primary); background: rgba(255,200,87,0.1); }
        .shelf-item, .reservoir-item { border: 2px solid var(--border-card); border-radius: 8px; padding: 16px; margin-bottom: 12px; background: var(--bg-primary); }
        .shelf-item { border-color: var(--accent-teal); }
        .reservoir-item { border-color: var(--accent-green); display: flex; gap: 12px; }
        .component-slot { min-height: 60px; border: 1px dashed var(--border-card); border-radius: 6px; padding: 8px; margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .component-slot.drag-over { border-color: var(--btn-primary); background: rgba(255,200,87,0.1); }
        .component-chip { background: var(--border-card); padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: grab; display: flex; align-items: center; gap: 8px; }
        .component-chip:active { cursor: grabbing; }
        .component-chip.pump { border-left: 3px solid var(--accent-teal); }
        .component-chip.light { border-left: 3px solid var(--btn-primary); }
        .component-chip.aerator { border-left: 3px solid var(--accent-green); }
        .component-chip.sensor { border-left: 3px solid var(--accent-gold); }
        .draggable-device { background: var(--accent-teal); padding: 8px 14px; border-radius: 6px; font-size: 13px; cursor: grab; display: block; margin-bottom: 8px; }
        .draggable-device:active { cursor: grabbing; }
        .available-devices-list { max-height: 300px; overflow-y: auto; }
        .drop-zone { min-height: 50px; border: 2px dashed var(--border-card); border-radius: 6px; display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; align-items: center; }
        .drop-zone.drag-over { border-color: var(--btn-primary); background: rgba(255,200,87,0.1); }
        .rack-actions { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }

        @media (max-width: 640px) { .devices-grid { grid-template-columns: 1fr; } header { flex-direction: column; align-items: flex-start; } .header-actions { width: 100%; flex-wrap: wrap; } .rack-builder { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="app-alert" id="appAlert"></div>
    <div class="container">
        <header>
            <h1>EBB Flow Controller</h1>
        </header>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('smart-devices')">Smart Device Configuration</button>
            <button class="tab" onclick="showTab('grow-layout')">Grow Layout Configuration</button>
            <button class="tab" onclick="showTab('grow-schedule')">Grow Schedule Configuration</button>
        </div>
        
        <div id="tab-smart-devices" class="tab-content active">
            <div class="header-actions" style="margin-bottom: 20px;">
                <select class="account-select" id="accountSelect" onchange="loadDevices()">
                    <option value="">Select Account</option>
                </select>
                <button class="btn-secondary btn-delete" id="deleteAccountBtn" onclick="deleteAccount()" title="Delete Account" style="display: none;">✕</button>
                <button class="btn-secondary" onclick="showAccountModal()">+ Account</button>
                <button class="btn-secondary" onclick="showDiscoverModal()">Scan</button>
                <button class="btn-secondary" onclick="showAddModal()">Add Device</button>
            </div>
            <div class="devices-grid" id="devicesGrid"></div>
        </div>
        
        <div id="tab-grow-layout" class="tab-content">
            <div class="rack-actions">
                <button class="btn-primary" onclick="showRackModal()">+ New Rack</button>
                <button class="btn-secondary" onclick="showShelfModal()" id="addShelfBtn" disabled>+ Add Shelf</button>
                <button class="btn-secondary" onclick="showReservoirModal()" id="addReservoirBtn" disabled>+ Add Reservoir</button>
            </div>
            <div class="rack-builder">
                <div style="grid-column: 1;">
                    <div style="background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 8px; padding: 16px;">
                        <h3 style="margin-bottom: 12px;">Racks</h3>
                        <div id="rackList"></div>
                    </div>
                    <div style="background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 8px; padding: 16px; margin-top: 16px;">
                        <h3 style="margin-bottom: 12px;">Smart Plugs</h3>
                        <div id="availableDevices"></div>
                    </div>
                </div>
                <div class="rack-canvas" id="rackCanvas">
                    <p style="color: var(--text-secondary); text-align: center; margin-top: 200px;">Select a rack to edit layout</p>
                </div>
            </div>
        </div>
        
        <div id="tab-grow-schedule" class="tab-content">
            <p style="color: var(--text-secondary);">Grow schedule configuration coming soon...</p>
        </div>
    </div>

    <div class="modal-overlay" id="accountModal">
        <div class="modal">
            <h2>Add Account</h2>
            <div class="modal-row">
                <label>Account Name</label>
                <input type="text" class="modal-input" id="accountName" placeholder="e.g., Home">
            </div>
            <div class="modal-row">
                <label>Provider</label>
                <select class="modal-select" id="accountProvider">
                    <option value="kasa">Kasa</option>
                    <option value="tapo">Tapo</option>
                </select>
            </div>
            <div class="modal-row">
                <label>Email</label>
                <input type="email" class="modal-input" id="accountEmail" placeholder="your@email.com">
            </div>
            <div class="modal-row">
                <label>Password</label>
                <input type="password" class="modal-input" id="accountPassword" placeholder="Your account password">
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="hideModals()">Cancel</button>
                <button class="btn-primary" onclick="createAccount()">Add</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="discoverModal">
        <div class="modal">
            <h2>Scan Network</h2>
            <div id="discoverContent" style="min-height: 100px;">
                <p style="color: var(--text-secondary);">Scanning for devices...</p>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="hideModals()">Cancel</button>
                <button class="btn-primary" id="discoverAddBtn" onclick="addDiscoveredDevices()" style="display: none;">Add Selected</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <h2>Add Device</h2>
            <input type="text" class="modal-input" id="deviceIp" placeholder="IP address (e.g., 192.168.1.100)">
            <div class="modal-actions">
                <button class="btn-secondary" onclick="hideModals()">Cancel</button>
                <button class="btn-primary" onclick="addDevice()">Add</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2>Edit Device</h2>
            <div class="modal-row">
                <label>Device Name</label>
                <input type="text" class="modal-input" id="deviceName" placeholder="Device name">
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="hideModals()">Cancel</button>
                <button class="btn-primary" onclick="saveDeviceName()">Save</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="rackModal">
        <div class="modal">
            <h2>New Grow Rack</h2>
            <div class="modal-row">
                <label>Rack Name</label>
                <input type="text" class="modal-input" id="rackName" placeholder="e.g., Main Rack">
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="hideModals()">Cancel</button>
                <button class="btn-primary" onclick="createRack()">Create</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="shelfModal">
        <div class="modal">
            <h2>Add Shelf</h2>
            <div class="modal-row">
                <label>Shelf Name</label>
                <input type="text" class="modal-input" id="shelfName" placeholder="e.g., Top Shelf">
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="hideModals()">Cancel</button>
                <button class="btn-primary" onclick="createShelf()">Add</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="reservoirModal">
        <div class="modal">
            <h2>Add Reservoir</h2>
            <div class="modal-row">
                <label>Reservoir Name</label>
                <input type="text" class="modal-input" id="reservoirName" placeholder="e.g., Main Reservoir">
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="hideModals()">Cancel</button>
                <button class="btn-primary" onclick="createReservoir()">Add</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="componentModal">
        <div class="modal">
            <h2>Add Component</h2>
            <div class="modal-row">
                <label>Component Type</label>
                <select class="modal-select" id="componentType">
                    <option value="pump">Pump</option>
                    <option value="light">Light</option>
                    <option value="aerator">Aerator</option>
                    <option value="sensor">Sensor</option>
                </select>
            </div>
            <div class="modal-row">
                <label>Component Name</label>
                <input type="text" class="modal-input" id="componentName" placeholder="e.g., Circulation Pump">
            </div>
            <div class="modal-row">
                <label>Smart Plug (optional)</label>
                <select class="modal-select" id="componentDevice">
                    <option value="">-- None --</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="hideModals()">Cancel</button>
                <button class="btn-primary" onclick="createComponent()">Add</button>
            </div>
        </div>
    </div>

    <script>
        let devices = [];
        let racks = [];
        let currentRackId = null;
        let currentRackStructure = null;

        function showAlert(message, isError = true) {
            const el = document.getElementById('appAlert');
            el.textContent = message;
            el.style.background = isError ? 'var(--accent-red)' : 'var(--accent-green)';
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        function showConfirm(message) {
            return new Promise(resolve => {
                const el = document.getElementById('appAlert');
                el.textContent = message + ' (OK to confirm, Cancel to abort)';
                el.style.background = 'var(--accent-gold)';
                el.style.color = 'var(--btn-text)';
                el.classList.add('show');
                el.onclick = () => { el.classList.remove('show'); resolve(false); };
                setTimeout(() => { el.classList.remove('show'); resolve(true); }, 5000);
            });
        }

        let confirmHandler = null;
        function setConfirmHandler(fn) { confirmHandler = fn; }

        function showTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
            if (tabId === 'grow-layout') { loadRacks(); loadDevices(); renderAvailableDevices(); }
        }

        function showAccountModal() { document.getElementById('accountModal').classList.add('active'); document.getElementById('accountName').focus(); }
        function showAddModal() { document.getElementById('addModal').classList.add('active'); document.getElementById('deviceIp').focus(); }
        function showDiscoverModal() { document.getElementById('discoverModal').classList.add('active'); runDiscovery(); }
        function showRackModal() { document.getElementById('rackModal').classList.add('active'); document.getElementById('rackName').focus(); }
        function showShelfModal() { document.getElementById('shelfModal').classList.add('active'); document.getElementById('shelfName').focus(); }
        function showReservoirModal() { document.getElementById('reservoirModal').classList.add('active'); document.getElementById('reservoirName').focus(); }
        function showComponentModal(ptype, pid) { 
            currentComponentParent = { type: ptype, id: pid };
            document.getElementById('componentModal').classList.add('active');
            document.getElementById('componentName').focus();
            populateDeviceSelect();
        }

        let currentComponentParent = null;

        async function populateDeviceSelect() {
            const select = document.getElementById('componentDevice');
            const res = await fetch('/api/devices');
            const devs = await res.json();
            select.innerHTML = '<option value="">-- None --</option>';
            devs.forEach(d => {
                select.innerHTML += `<option value="${d.id}">${d.name}</option>`;
            });
        }

        async function createComponent() {
            const component_type = document.getElementById('componentType').value;
            const name = document.getElementById('componentName').value.trim();
            const device_id = document.getElementById('componentDevice').value || null;
            if (!name) { alert('Name required'); return; }

            await fetch('/api/components', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    parent_type: currentComponentParent.type,
                    parent_id: currentComponentParent.id,
                    component_type,
                    name,
                    device_id: device_id ? parseInt(device_id) : null
                })
            });
            hideModals();
            document.getElementById('componentName').value = '';
            loadRackStructure(currentRackId);
        }

        async function createRack() {
            const name = document.getElementById('rackName').value.trim();
            if (!name) { showAlert('Name required'); return; }
            await fetch('/api/racks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            hideModals();
            document.getElementById('rackName').value = '';
            loadRacks();
        }

        async function createShelf() {
            const name = document.getElementById('shelfName').value.trim() || 'New Shelf';
            await fetch('/api/racks/' + currentRackId + '/shelves', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, position: currentRackStructure.shelves.length })
            });
            hideModals();
            document.getElementById('shelfName').value = '';
            loadRackStructure(currentRackId);
        }

        async function createReservoir() {
            const name = document.getElementById('reservoirName').value.trim() || 'New Reservoir';
            await fetch('/api/racks/' + currentRackId + '/reservoirs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, position: currentRackStructure.reservoirs.length })
            });
            hideModals();
            document.getElementById('reservoirName').value = '';
            loadRackStructure(currentRackId);
        }

        async function loadRacks() {
            const res = await fetch('/api/racks');
            racks = await res.json();
            renderRackList();
        }

        function renderRackList() {
            const list = document.getElementById('rackList');
            if (racks.length === 0) {
                list.innerHTML = '<p style="color: var(--text-secondary);">No racks yet. Create one to start.</p>';
                return;
            }
            list.innerHTML = racks.map(r => `
                <div class="rack-list-item ${r.id === currentRackId ? 'active' : ''}" onclick="selectRack(${r.id})">
                    <strong>${r.name}</strong>
                </div>
            `).join('');
        }

        async function selectRack(rackId) {
            currentRackId = rackId;
            document.getElementById('addShelfBtn').disabled = false;
            document.getElementById('addReservoirBtn').disabled = false;
            renderRackList();
            await loadRackStructure(rackId);
        }

        async function loadRackStructure(rackId) {
            const res = await fetch('/api/racks/' + rackId + '/structure');
            currentRackStructure = await res.json();
            renderRackCanvas();
        }

        function renderRackCanvas() {
            const canvas = document.getElementById('rackCanvas');
            if (!currentRackStructure) {
                canvas.innerHTML = '<p style="color: var(--text-secondary); text-align: center; margin-top: 200px;">Select a rack to edit layout</p>';
                return;
            }

            let html = `<h2>${currentRackStructure.rack.name}</h2>`;

            if (currentRackStructure.reservoirs.length > 0) {
                html += '<h3 style="color: var(--accent-green); margin: 16px 0 8px;">Reservoirs</h3>';
                currentRackStructure.reservoirs.forEach(res => {
                    const comps = currentRackStructure.components.filter(c => c.parent_type === 'reservoir' && c.parent_id === res.id);
                    html += renderReservoir(res, comps);
                });
            }

            if (currentRackStructure.shelves.length > 0) {
                html += '<h3 style="color: var(--accent-teal); margin: 16px 0 8px;">Shelves</h3>';
                currentRackStructure.shelves.sort((a,b) => a.position - b.position).forEach(shelf => {
                    const comps = currentRackStructure.components.filter(c => c.parent_type === 'shelf' && c.parent_id === shelf.id);
                    html += renderShelf(shelf, comps);
                });
            } else {
                html += '<p style="color: var(--text-secondary); margin-top: 20px;">Add shelves to this rack</p>';
            }

            canvas.innerHTML = html;
        }

        function renderReservoir(res, comps) {
            const aerators = comps.filter(c => c.component_type === 'aerator');
            return `
                <div class="reservoir-item" data-id="${res.id}" data-type="reservoir">
                    <div style="flex: 1;">
                        <strong>${res.name}</strong>
                        <div style="margin-top: 8px;">
                            <strong style="color: var(--accent-green);">Aerators:</strong>
                            <div class="component-slot" data-parent="reservoir" data-id="${res.id}" data-type="aerator">
                                ${aerators.length === 0 ? '<span style="color: var(--text-secondary); font-size: 12px;">Drag aerator here</span>' : ''}
                                ${aerators.map(c => renderComponentChip(c)).join('')}
                            </div>
                            <button class="btn-secondary" style="margin-top: 8px; font-size: 12px; padding: 6px 12px;" onclick="showComponentModal('reservoir', ${res.id})">+ Add Device</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderShelf(shelf, comps) {
            const pumps = comps.filter(c => c.component_type === 'pump');
            const lights = comps.filter(c => c.component_type === 'light');
            const sensors = comps.filter(c => c.component_type === 'sensor');
            return `
                <div class="shelf-item" data-id="${shelf.id}" data-type="shelf">
                    <strong>${shelf.name}</strong>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 12px;">
                        <div>
                            <strong style="color: var(--accent-teal);">Pumps:</strong>
                            <div class="component-slot" data-parent="shelf" data-id="${shelf.id}" data-type="pump">
                                ${pumps.length === 0 ? '<span style="color: var(--text-secondary); font-size: 12px;">Drag pump</span>' : ''}
                                ${pumps.map(c => renderComponentChip(c)).join('')}
                            </div>
                            <button class="btn-secondary" style="margin-top: 8px; font-size: 12px; padding: 6px 12px;" onclick="showComponentModal('shelf', ${shelf.id})">+ Add Device</button>
                        </div>
                        <div>
                            <strong style="color: var(--btn-primary);">Lights:</strong>
                            <div class="component-slot" data-parent="shelf" data-id="${shelf.id}" data-type="light">
                                ${lights.length === 0 ? '<span style="color: var(--text-secondary); font-size: 12px;">Drag light</span>' : ''}
                                ${lights.map(c => renderComponentChip(c)).join('')}
                            </div>
                        </div>
                        <div>
                            <strong style="color: var(--accent-gold);">Sensors:</strong>
                            <div class="component-slot" data-parent="shelf" data-id="${shelf.id}" data-type="sensor">
                                ${sensors.length === 0 ? '<span style="color: var(--text-secondary); font-size: 12px;">Add sensor</span>' : ''}
                                ${sensors.map(c => renderComponentChip(c)).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderComponentChip(c) {
            return `
                <div class="component-chip ${c.component_type}" data-id="${c.id}" draggable="true">
                    <span>${c.name}</span>
                    <span style="opacity: 0.6; cursor: pointer;" onclick="removeComponent(${c.id})">✕</span>
                </div>
            `;
        }

        async function removeComponent(id) {
            const confirmed = await showConfirm('Remove this component?');
            if (!confirmed) return;
            await fetch('/api/components/' + id, { method: 'DELETE' });
            loadRackStructure(currentRackId);
        }

        async function deleteCurrentRack() {
            const confirmed = await showConfirm('Delete this rack and all its contents?');
            if (!confirmed) return;
            await fetch('/api/racks/' + currentRackId, { method: 'DELETE' });
            currentRackId = null;
            currentRackStructure = null;
            document.getElementById('addShelfBtn').disabled = true;
            document.getElementById('addReservoirBtn').disabled = true;
            loadRacks();
        }

        function renderAvailableDevices() {
            const div = document.getElementById('availableDevices');
            if (devices.length === 0) {
                div.innerHTML = '<p style="color: var(--text-secondary);">No smart plugs added. Add them in Smart Device tab first.</p>';
                return;
            }
            div.innerHTML = devices.map(d => `
                <div class="draggable-device" draggable="true" data-device-id="${d.id}" data-device-name="${d.name.replace(/"/g, '&quot;')}">
                    🔌 ${d.name}
                </div>
            `).join('');

            div.querySelectorAll('.draggable-device').forEach(el => {
                el.addEventListener('dragstart', e => {
                    e.dataTransfer.setData('deviceId', el.dataset.deviceId);
                    e.dataTransfer.setData('deviceName', el.dataset.deviceName);
                });
            });
        }

        document.addEventListener('dragover', e => {
            if (e.target.classList.contains('component-slot')) {
                e.preventDefault();
                e.target.classList.add('drag-over');
            }
        });

        document.addEventListener('dragleave', e => {
            if (e.target.classList.contains('component-slot')) {
                e.target.classList.remove('drag-over');
            }
        });

        document.addEventListener('drop', async e => {
            const slot = e.target.closest('.component-slot');
            if (!slot) return;
            slot.classList.remove('drag-over');

            const deviceId = e.dataTransfer.getData('deviceId');
            const deviceName = e.dataTransfer.getData('deviceName');
            if (!deviceId) return;

            const parentType = slot.dataset.parent;
            const parentId = parseInt(slot.dataset.id);
            const componentType = slot.dataset.type;

            const existingRes = await fetch('/api/components?parent_type=' + parentType + '&parent_id=' + parentId + '&device_id=' + deviceId);
            const existing = await existingRes.json();
            if (existing.length > 0) {
                showAlert('This plug is already assigned to this component');
                return;
            }

            await fetch('/api/components', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    parent_type: parentType,
                    parent_id: parentId,
                    component_type: componentType,
                    name: deviceName,
                    device_id: parseInt(deviceId)
                })
            });
            loadRackStructure(currentRackId);
        });
        let editingDeviceId = null;
        function showEditModal(id, name) { 
            editingDeviceId = id; 
            document.getElementById('deviceName').value = name;
            document.getElementById('editModal').classList.add('active'); 
            document.getElementById('deviceName').focus(); 
        }
        async function saveDeviceName() {
            const name = document.getElementById('deviceName').value.trim();
            if (!name || !editingDeviceId) return;
            
            await fetch('/api/devices/' + editingDeviceId, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            hideModals();
            editingDeviceId = null;
            loadDevices();
        }
        function hideModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }

        let discoveredDevices = {};

        async function runDiscovery() {
            const content = document.getElementById('discoverContent');
            document.getElementById('discoverAddBtn').style.display = 'none';
            content.innerHTML = '<p style="color: var(--text-secondary);">Scanning for devices...</p>';

            const accountId = document.getElementById('accountSelect').value || null;
            const res = await fetch('/api/devices/discover', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ account_id: accountId })
            });
            discoveredDevices = await res.json();

            const ips = Object.keys(discoveredDevices);
            if (ips.length === 0) {
                content.innerHTML = '<p style="color: var(--text-secondary);">No devices found. Make sure devices are on the same network.</p>';
                return;
            }

            content.innerHTML = ips.map(ip => `
                <label style="display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid var(--border-card); border-radius: 6px; margin-bottom: 8px; cursor: pointer;">
                    <input type="checkbox" value="${ip}" style="width: 18px; height: 18px;">
                    <div>
                        <div style="font-weight: 600;">${discoveredDevices[ip].model || 'Smart Outlet'}</div>
                        <div style="color: var(--text-secondary); font-size: 12px;">${ip}</div>
                    </div>
                </label>
            `).join('');
            document.getElementById('discoverAddBtn').style.display = 'inline-block';
        }

        async function addDiscoveredDevices() {
            const checkboxes = document.querySelectorAll('#discoverContent input[type="checkbox"]:checked');
            const ips = Array.from(checkboxes).map(c => c.value);
            const accountId = document.getElementById('accountSelect').value || null;

            for (const ip of ips) {
const res = await fetch('/api/devices', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ip_address: ip, account_id: accountId })
                });
            }
            hideModals();
            loadDevices();
        }

        document.querySelectorAll('.modal-overlay').forEach(m => m.addEventListener('click', e => { if (e.target === m) hideModals(); }));
        document.getElementById('deviceIp').addEventListener('keydown', e => { if (e.key === 'Enter') addDevice(); });

        async function loadAccounts() {
            const res = await fetch('/api/accounts');
            const accounts = await res.json();
            const select = document.getElementById('accountSelect');
            const deleteBtn = document.getElementById('deleteAccountBtn');
            select.innerHTML = '<option value="">Select Account</option>';
            accounts.forEach(a => {
                select.innerHTML += `<option value="${a.id}">${a.name} (${a.provider})</option>`;
            });
            select.onchange = function() {
                deleteBtn.style.display = this.value ? 'inline-block' : 'none';
                loadDevices();
            };
        }

        async function deleteAccount() {
            const accountId = document.getElementById('accountSelect').value;
            if (!accountId) return;
            if (!confirm('Delete this account and all its devices?')) return;
            
            const res = await fetch('/api/accounts/' + accountId, { method: 'DELETE' });
            if (res.ok) {
                document.getElementById('deleteAccountBtn').style.display = 'none';
                await loadAccounts();
                await loadDevices();
            }
        }

        async function createAccount() {
            const name = document.getElementById('accountName').value.trim();
            const provider = document.getElementById('accountProvider').value;
            const username = document.getElementById('accountEmail').value.trim();
            const password = document.getElementById('accountPassword').value;

            if (!name || !username || !password) { showAlert('Please fill all fields'); return; }

            try {
                const res = await fetch('/api/accounts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, provider, username, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    hideModals();
                    document.getElementById('accountName').value = '';
                    document.getElementById('accountEmail').value = '';
                    document.getElementById('accountPassword').value = '';
                    await loadAccounts();
                    document.getElementById('accountSelect').value = data.id;
                    await loadDevices();
                } else {
                    const data = await res.json();
                    showAlert(data.error || 'Failed to create account');
                }
            } catch (e) {
                showAlert('Error: ' + e.message);
            }
        }

        async function loadDevices() {
            const accountId = document.getElementById('accountSelect').value;
            const url = accountId ? `/api/devices?account_id=${accountId}` : '/api/devices';
            const res = await fetch(url);
            devices = await res.json();
            renderDevices();
        }

        function renderDevices() {
            const grid = document.getElementById('devicesGrid');
            if (devices.length === 0) {
                grid.innerHTML = '<div class="empty-state"><h2>No devices</h2><p>Add an account then add a device</p></div>';
                return;
            }
            grid.innerHTML = devices.map(d => `
                <div class="device-card" data-id="${d.id}">
                    <div class="device-header">
                        <span class="device-icon">🔌</span>
                        <span class="device-status ${d.is_on ? 'on' : 'off'}" id="status-${d.id}">${d.is_on ? 'ON' : 'OFF'}</span>
                    </div>
                    <div class="device-name">${d.name}</div>
                    <div class="device-info">${d.ip_address}</div>
                    <div class="device-actions">
                        <button class="btn-toggle ${d.is_on ? 'on' : ''}" onclick="toggleDevice(${d.id})" id="toggle-${d.id}">${d.is_on ? 'Turn Off' : 'Turn On'}</button>
                        <button class="btn-delete" onclick="showEditModal(${d.id}, '${d.name.replace(/'/g, "\\'")}')" title="Edit name">✏</button>
                        <button class="btn-delete" onclick="deleteDevice(${d.id})">🗑</button>
                    </div>
                </div>
            `).join('');
        }

        async function toggleDevice(id) {
            const btn = document.getElementById('toggle-' + id);
            const status = document.getElementById('status-' + id);
            btn.disabled = true; btn.textContent = '...';
            status.className = 'device-status loading'; status.textContent = '...';

            const res = await fetch('/api/devices/' + id + '/toggle', { method: 'POST' });
            const data = await res.json();
            if (data.error) { showAlert(data.error); loadDevices(); }
            else { btn.className = 'btn-toggle ' + (data.is_on ? 'on' : ''); btn.textContent = data.is_on ? 'Turn Off' : 'Turn On'; status.className = 'device-status ' + (data.is_on ? 'on' : 'off'); status.textContent = data.is_on ? 'ON' : 'OFF'; }
            btn.disabled = false;
        }

        async function deleteDevice(id) {
            if (!confirm('Remove this device?')) return;
            await fetch('/api/devices/' + id, { method: 'DELETE' });
            loadDevices();
        }

        async function addDevice() {
            const ip = document.getElementById('deviceIp').value.trim();
            const accountId = document.getElementById('accountSelect').value || null;
            if (!ip) return;

            const res = await fetch('/api/devices', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ip_address: ip, account_id: accountId })
            });

            if (res.ok) { hideModals(); loadDevices(); }
            else { const data = await res.json(); alert(data.error || 'Failed to add device'); }
        }

        loadAccounts();
        loadDevices();
    </script>
</body>
</html>
